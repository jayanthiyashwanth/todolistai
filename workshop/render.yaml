services:
  - type: web
    name: smart-todo-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: APP_NAME
        value: SmartTodoAI
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
